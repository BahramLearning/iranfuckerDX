name: AVASAMYT - Download from URLs & Save to Repo

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      split_threshold_mb:
        description: 'Split files larger than this MB (0 = never split)'
        required: false
        default: 90
        type: number
      youtube_format:
        description: 'YouTube quality format'
        required: false
        default: 'best'
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install latest yt-dlp (critical - must be latest)
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip ffmpeg python3-pip
          # Install latest yt-dlp directly from GitHub (not apt package!)
          # APT packages are often outdated and don't have the latest bypasses[citation:1]
          sudo pip3 install --break-system-packages --upgrade yt-dlp
          # Verify version
          yt-dlp --version

      - name: AVASAM Downloader - https://avasam.ir
        run: |
          echo "🏷️  AVASAM - Your Download Solution"
          echo "🌐 https://avasam.ir"
          echo "⚠️  Note: Age-restricted videos require cookies. Without cookies, only works on public videos."
          echo ""

      - name: Download files (YouTube optimized)
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          SPLIT_THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          YT_FORMAT="${{ github.event.inputs.youtube_format }}"
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          echo "YouTube format: $YT_FORMAT"

          mkdir -p downloads tmp_downloads

          # Download each URL
          for URL in $URLS; do
            echo "⬇️ Processing: $URL"
            
            if [[ "$URL" =~ (youtube\.com|youtu\.be) ]]; then
              echo "🎬 YouTube detected!"
              cd tmp_downloads
              
              # Method that works in 2026 for public videos[citation:3][citation:7]
              # Uses android client + multiple extraction attempts + retry logic
              yt-dlp \
                -f "$YT_FORMAT" \
                --merge-output-format mkv \
                --extractor-args "youtube:player_client=android,web;youtube:skip=hls,dash" \
                --geo-bypass \
                --retries 10 \
                --fragment-retries 10 \
                --sleep-requests 2 \
                --sleep-interval 3 \
                --max-sleep-interval 8 \
                --no-check-certificate \
                --output "%(title)s.%(ext)s" \
                "$URL" \
                2>&1 | tee download.log
              
              # If failed with "Sign in to confirm" error, try with rate limiting delay[citation:1]
              if grep -q "Sign in to confirm\|bot" download.log; then
                echo "⚠️ YouTube bot detection triggered. Waiting 60 seconds then retrying..."
                sleep 60
                yt-dlp \
                  -f "$YT_FORMAT" \
                  --merge-output-format mkv \
                  --extractor-args "youtube:player_client=ios,android" \
                  --sleep-requests 5 \
                  --sleep-interval 5 \
                  --max-sleep-interval 15 \
                  --limit-rate 2M \
                  --retries 20 \
                  --output "%(title)s.%(ext)s" \
                  "$URL"
              fi
              
              cd ..
            else
              # Regular direct download
              FILENAME=$(basename "$URL")
              aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=90M \
                --dir="tmp_downloads" \
                --out="$FILENAME" \
                "$URL"
            fi
          done

          # Zip all downloads if mode is 'zip'
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            echo "📦 Creating zip archive: $ARCHIVE_NAME"
            zip -j "$ARCHIVE_NAME" tmp_downloads/* 2>/dev/null || true
            rm -rf tmp_downloads
          else
            # Normal mode: handle splitting large files
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              [[ "$FILE" == *.log ]] && continue
              SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo "0")
              BASENAME=$(basename "$FILE")

              if [ "$SPLIT_THRESHOLD_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting"
                zip -0 -s "${SPLIT_THRESHOLD_MB}m" "downloads/${BASENAME}.zip" -j "$FILE"
              else
                cp "$FILE" "downloads/$BASENAME"
              fi
            done
            rm -rf tmp_downloads
          fi

      - name: Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads/
          git commit -m "[AVASAM] Add downloaded files [skip ci]" || echo "No changes to commit"
          git pull --rebase origin "$BRANCH" || true
          git push origin HEAD:"$BRANCH"

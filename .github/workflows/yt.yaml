name: IranYTDL - Download from YT or direct link

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download (YouTube, direct links, etc.)'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      split_threshold_mb:
        description: 'Split files larger than this MB (0 = never split)'
        required: false
        default: 90
        type: number

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ultimate YouTube downloader setup
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip ffmpeg python3-pip wget curl
          
          # Install yt-dlp with all dependencies
          pip3 install yt-dlp --upgrade --break-system-packages || pip3 install yt-dlp --upgrade
          
          # Also install youtube-dl as backup
          pip3 install youtube-dl --break-system-packages || pip3 install youtube-dl
          
          # Install gallery-dl for additional sites
          pip3 install gallery-dl --break-system-packages || pip3 install gallery-dl
          
          # Download latest cookies extractor
          wget https://raw.githubusercontent.com/yt-dlp/yt-dlp/master/yt_dlp/extractor/youtube.py -O /tmp/youtube_extractor.py || true

      - name: AVASAM Downloader - Advanced YouTube Bypass
        run: |
          echo "🏷️  AVASAM - Ultimate Download Solution"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Download with aggressive bypass
        run: |
          URLS="${{ github.event.inputs.urls }}"
          MODE="${{ github.event.inputs.mode }}"
          SPLIT_THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          mkdir -p downloads tmp_downloads
          
          # Create a comprehensive yt-dlp config
          cat > yt-dlp.conf << 'EOF'
          # Format selection
          -f bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best
          
          # Merge options
          --merge-output-format mp4
          
          # Bypass methods - AGGRESSIVE
          --extractor-args "youtube:player_client=android,ios,web;youtube:skip=hls,dash,webpage,js;youtube:include_client=android_embedded"
          --extractor-args "youtube:player_skip=configs,webpage,js"
          --geo-bypass
          --geo-bypass-country US
          --sleep-requests 0.5
          --sleep-interval 1
          --max-sleep-interval 3
          --retries 25
          --fragment-retries 25
          --skip-unavailable-fragments
          --no-check-certificate
          --no-cache-dir
          
          # Use different clients
          --extractor-args "youtube:android_client=android_embedded"
          --extractor-args "youtube:ios_client=ios_embedded"
          
          # Force HTTP/1.1
          --downloader-args "aria2c:-x 16 -k 1M --http1.1"
          EOF

          # Download function with multiple strategies
          download_with_retry() {
            local url="$1"
            local output="$2"
            local strategy="$3"
            
            echo "🔄 Strategy $strategy for: $url"
            
            case $strategy in
              1)
                # Method 1: Android embedded client (works often)
                yt-dlp --config-location yt-dlp.conf \
                  --extractor-args "youtube:player_client=android_embedded,android" \
                  -o "$output" \
                  "$url" && return 0
                ;;
              2)
                # Method 2: iOS client
                yt-dlp --config-location yt-dlp.conf \
                  --extractor-args "youtube:player_client=ios_embedded,ios" \
                  -o "$output" \
                  "$url" && return 0
                ;;
              3)
                # Method 3: Web client with different signature
                yt-dlp --config-location yt-dlp.conf \
                  --extractor-args "youtube:player_client=web,web_embedded" \
                  --extractor-args "youtube:player_skip=webpage" \
                  -o "$output" \
                  "$url" && return 0
                ;;
              4)
                # Method 4: TV client (sometimes works on restricted content)
                yt-dlp --config-location yt-dlp.conf \
                  --extractor-args "youtube:player_client=tv_embedded,tv" \
                  -o "$output" \
                  "$url" && return 0
                ;;
              5)
                # Method 5: Media Connect client
                yt-dlp --config-location yt-dlp.conf \
                  --extractor-args "youtube:player_client=mediaconnect" \
                  -o "$output" \
                  "$url" && return 0
                ;;
              6)
                # Method 6: Use yt-dlp with innertube API key
                yt-dlp --config-location yt-dlp.conf \
                  --extractor-args "youtube:innertube_host=www.youtube-nocookie.com" \
                  --extractor-args "youtube:innertube_key=AIzaSyAO_FJ2SlqU8Q4STEHLGCilw_Y9_11qcW8" \
                  -o "$output" \
                  "$url" && return 0
                ;;
              7)
                # Method 7: Old youtube-dl as fallback
                youtube-dl -f "best[ext=mp4]" \
                  --geo-bypass \
                  --retries 10 \
                  -o "$output" \
                  "$url" && return 0
                ;;
              8)
                # Method 8: Try downloading just audio first, then convert
                yt-dlp -f "bestaudio" \
                  --extract-audio \
                  --audio-format mp3 \
                  --audio-quality 0 \
                  -o "$output" \
                  "$url" && return 0
                ;;
              9)
                # Method 9: Use gallery-dl as last resort
                gallery-dl -o "output.filename=$output" \
                  --retries 5 \
                  "$url" && return 0
                ;;
            esac
            return 1
          }

          # Process each URL
          for URL in $URLS; do
            echo "========================================="
            echo "🎯 Processing: $URL"
            echo "========================================="
            
            cd tmp_downloads
            
            if [[ "$URL" =~ (youtube\.com|youtu\.be) ]]; then
              echo "🎬 YouTube video detected - applying 9 bypass strategies"
              
              # Try to get video info first
              VIDEO_ID=$(echo "$URL" | grep -oE '(v=|/)([a-zA-Z0-9_-]{11})' | head -1 | sed 's/.*=//;s/.*\///')
              OUTPUT_TEMPLATE="%(title)s [${VIDEO_ID}].%(ext)s"
              
              SUCCESS=0
              for strategy in {1..9}; do
                if download_with_retry "$URL" "$OUTPUT_TEMPLATE" $strategy; then
                  SUCCESS=1
                  echo "✅ SUCCESS with strategy $strategy!"
                  break
                else
                  echo "❌ Strategy $strategy failed"
                  sleep 2
                fi
              done
              
              if [ $SUCCESS -eq 0 ]; then
                echo "💀 ALL STRATEGIES FAILED for $URL"
                echo "This video may require cookies or is DRM protected"
                
                # Save failed URL for manual processing
                echo "$URL" >> ../downloads/failed_urls.txt
              fi
              
            else
              # Regular download
              FILENAME=$(basename "$URL")
              echo "📁 Regular download: $FILENAME"
              aria2c -x 16 -s 16 -k 1M --http1.1 \
                --dir="." \
                --out="$FILENAME" \
                "$URL" || wget -O "$FILENAME" "$URL"
            fi
            
            cd ..
            echo ""
          done

          # Process downloaded files
          echo "📦 Processing downloads..."
          
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            find tmp_downloads -type f -size +0c -exec zip -j "$ARCHIVE_NAME" {} \;
            rm -rf tmp_downloads
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo "0")
              BASENAME=$(basename "$FILE")
              
              if [ "$SIZE" -eq 0 ]; then
                echo "⚠️ Skipping empty file: $BASENAME"
                continue
              fi
              
              if [ "$SPLIT_THRESHOLD_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "✂️ Splitting large file: $BASENAME"
                zip -0 -s "${SPLIT_THRESHOLD_MB}m" "downloads/${BASENAME}.zip" -j "$FILE"
              else
                cp "$FILE" "downloads/$BASENAME"
              fi
            done
            rm -rf tmp_downloads
          fi
          
          # Create summary report
          echo "📊 Download Summary:" > downloads/SUMMARY.txt
          echo "===================" >> downloads/SUMMARY.txt
          ls -lh downloads/ | grep -v SUMMARY >> downloads/SUMMARY.txt
          
          if [ -f downloads/failed_urls.txt ]; then
            echo "" >> downloads/SUMMARY.txt
            echo "❌ Failed URLs:" >> downloads/SUMMARY.txt
            cat downloads/failed_urls.txt >> downloads/SUMMARY.txt
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          if [ -d "downloads" ] && [ "$(ls -A downloads)" ]; then
            git add downloads/
            git commit -m "[AVASAM] Downloaded content [skip ci]" || echo "No changes"
            git pull --rebase origin ${GITHUB_REF_NAME} || true
            git push origin HEAD:${GITHUB_REF_NAME} --force-with-lease
            echo "✅ Pushed to repository"
          else
            echo "ℹ️ No files to commit"
          fi
